<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <style>
        body{
            margin:0;
            font-family:Arial,sans-serif;
            background:#4facfe;
        }

        .header{
            background:#007BFF;
            color:white;
            padding:15px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .header h2{
            margin:0;
        }

        .logout{
            background:red;
            color:white;
            padding:8px 15px;
            text-decoration:none;
            border-radius:5px;
        }

        .container{
            width:80%;
            margin:40px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,.2);
            text-align:center;
        }

        h1{
            color:#007BFF;
        }

        p{
            font-size:18px;
        }

        .btn{
            display:inline-block;
            margin-top:20px;
            padding:12px 20px;
            background:#007BFF;
            color:white;
            text-decoration:none;
            border-radius:5px;
        }

        .btn:hover{
            background:#0056b3;
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>🎓 AI Student Support Chatbot</h2>
        <a href="/login" class="logout">Logout</a>
    </div>

    <div class="container">
        <h1>Welcome to Dashboard</h1>

        <p>You have successfully logged in.</p>

        <p>From here you can access your AI Student Support Chatbot.</p>

        <a href="/" class="btn">Open Chatbot</a>
    </div>

</body>
</html>
